name: KERMT
repo: NVIDIA-BioNeMo/KERMT
description: KERMT molecular foundation model — setup, pretraining, finetuning, inference, and embedding skills.
ref: main
# Bulk entry (one path -> one grouped catalog dir). The flat NVIDIA/skills
# convention is one entry per skill; we use the bulk form because we keep the
# grouped tree. catalog_dir is kept at DEPTH 1 under the group root (like the
# other sourced components) so prune-orphans.sh stays uniform: agent/skills/*
# lands directly under open-models-skills/kermt/<skill>. TODO(verify): public
# KERMT publishes 8 skills under agent/skills/ on main.
skills:
  - path: agent/skills
    catalog_dir: open-models-skills/kermt
