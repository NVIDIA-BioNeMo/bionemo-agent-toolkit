schema_version = "1.3"

[task]
name = "nvidia/proteinmpnn-local-design"
description = "Design sequences with a local GPU-hosted ProteinMPNN NIM"

[metadata]
entry_id = "proteinmpnn-local-design"

[agent]
timeout_sec = 900.0

[verifier]
timeout_sec = 600.0
environment_mode = "shared"

[environment]
build_timeout_sec = 1800.0
cpus = 4
memory_mb = 8192
storage_mb = 16384
gpus = 1
network_mode = "public"
skills_dir = "/workspace/skills"
workdir = "/workspace"

[environment.healthcheck]
command = "curl -fsS http://127.0.0.1:8000/v1/health/ready"
interval_sec = 10.0
timeout_sec = 10.0
start_period_sec = 300.0
start_interval_sec = 10.0
retries = 60
